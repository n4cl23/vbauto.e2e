name: Cypress E2E Tests

on:
  push:
    branches:
      - main
      - 'regressao-*'

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:

  cypress-run:

    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate HMG access and credentials
        env:
          CYPRESS_USERNAME: ${{ secrets.CYPRESS_USERNAME }}
          CYPRESS_PASSWORD: ${{ secrets.CYPRESS_PASSWORD }}
        run: |
          if [ -z "$CYPRESS_USERNAME" ] || [ -z "$CYPRESS_PASSWORD" ]; then
            echo "::error title=Missing Cypress secrets::Configure CYPRESS_USERNAME and CYPRESS_PASSWORD in repository secrets."
            exit 1
          fi

          curl --fail --silent --show-error --location --max-time 30 \
            https://hmg.vbconnection.info/vbconnection/login > /dev/null

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        timeout-minutes: 180
        with:
          browser: chrome
          command: npm run test -- --browser chrome --headless
        env:
          CYPRESS_USERNAME: ${{ secrets.CYPRESS_USERNAME }}
          CYPRESS_PASSWORD: ${{ secrets.CYPRESS_PASSWORD }}

      - name: Upload screenshots (failures)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

      - name: Upload videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos
          if-no-files-found: ignore

      - name: Upload Mochawesome reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-reports
          path: cypress/reports
          if-no-files-found: ignore
